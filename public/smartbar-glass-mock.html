<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>SmartBar Glass Mock</title>
    <style>
      :root {
        color-scheme: dark;
        --phone-w: 390px;
        --phone-h: 844px;
        --page-bg: #120b08;
        --ink: #ffffff;
        --muted: rgba(255, 255, 255, 0.68);
        --quiet: rgba(255, 255, 255, 0.48);
        --glass-fill-top: rgba(255, 255, 255, 0.18);
        --glass-fill-mid: rgba(255, 255, 255, 0.075);
        --glass-fill-bottom: rgba(255, 255, 255, 0.035);
        --glass-border: rgba(255, 255, 255, 0.58);
        --glass-ring: rgba(255, 255, 255, 0.28);
        --glass-shadow: rgba(2, 6, 23, 0.24);
        --green: #7df2a5;
        --yellow: #f6d653;
        --red: #ef3f5b;
        --blue: #62d7ff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 16% 8%, rgba(253, 216, 91, 0.24), transparent 30%),
          radial-gradient(circle at 92% 88%, rgba(239, 63, 91, 0.20), transparent 28%),
          linear-gradient(180deg, #24110c 0%, #080503 100%);
        color: white;
      }

      body {
        display: grid;
        place-items: center;
        padding: 0;
      }

      .phone {
        position: relative;
        width: min(100vw, var(--phone-w));
        min-height: min(100svh, var(--phone-h));
        height: min(100svh, var(--phone-h));
        overflow: hidden;
        background: var(--page-bg);
        isolation: isolate;
      }

      @media (min-width: 460px) {
        body {
          padding: 22px;
        }

        .phone {
          border: 1px solid rgba(255, 255, 255, 0.12);
          border-radius: 44px;
          box-shadow: 0 34px 100px rgba(0, 0, 0, 0.52);
        }
      }

      .food-page {
        position: absolute;
        inset: 0;
        overflow: hidden;
        background:
          radial-gradient(circle at 78% 18%, rgba(255, 212, 78, 0.28), transparent 24%),
          linear-gradient(180deg, #2b120a 0%, #180a05 42%, #080503 100%);
      }

      .hero {
        position: relative;
        min-height: 220px;
        padding: 18px 18px 20px;
        background:
          linear-gradient(180deg, rgba(255, 211, 90, 0.22), transparent 62%),
          radial-gradient(circle at 56% 58%, rgba(255, 152, 67, 0.34), transparent 30%);
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        font-weight: 950;
        letter-spacing: -0.03em;
      }

      .brand-mark {
        display: grid;
        width: 34px;
        height: 34px;
        place-items: center;
        border-radius: 13px;
        background: linear-gradient(135deg, #ffd447, #f64e4e);
        color: #241109;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.42), 0 10px 26px rgba(0, 0, 0, 0.30);
      }

      .brand small {
        display: block;
        margin-top: -2px;
        color: rgba(255, 255, 255, 0.62);
        font-size: 11px;
        letter-spacing: 0.07em;
        text-transform: uppercase;
      }

      .menu-chip {
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 999px;
        padding: 8px 11px;
        background: rgba(0, 0, 0, 0.18);
        color: rgba(255, 255, 255, 0.86);
        font-size: 12px;
        font-weight: 900;
        backdrop-filter: blur(14px);
      }

      .hero-title {
        margin: 48px 0 0;
        max-width: 285px;
        font-size: 41px;
        line-height: 0.9;
        letter-spacing: -0.07em;
        font-weight: 1000;
      }

      .hero-copy {
        margin-top: 10px;
        width: 260px;
        color: rgba(255, 255, 255, 0.70);
        font-size: 14px;
        font-weight: 750;
        line-height: 1.35;
      }

      .burger-orbit {
        position: absolute;
        right: -24px;
        top: 86px;
        width: 152px;
        height: 152px;
        border-radius: 44px;
        transform: rotate(-8deg);
        background:
          linear-gradient(180deg, #f7c956 0 22%, #7c3b21 22% 34%, #f5e266 34% 42%, #49bb66 42% 49%, #9b4526 49% 64%, #ffe07a 64% 100%);
        box-shadow: 0 28px 58px rgba(0, 0, 0, 0.36);
        opacity: 0.94;
      }

      .menu-section {
        position: absolute;
        inset: 214px 0 0;
        padding: 16px 16px 250px;
        overflow: hidden;
      }

      .section-label {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: 0 2px 10px;
        color: rgba(255, 255, 255, 0.70);
        font-size: 12px;
        font-weight: 950;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .food-card {
        display: grid;
        grid-template-columns: 72px minmax(0, 1fr) auto;
        gap: 12px;
        align-items: center;
        min-height: 86px;
        margin-bottom: 10px;
        padding: 11px;
        border-radius: 25px;
        border: 1px solid rgba(255, 255, 255, 0.10);
        background: rgba(255, 255, 255, 0.075);
        box-shadow: 0 14px 36px rgba(0, 0, 0, 0.24);
      }

      .food-thumb {
        width: 72px;
        height: 64px;
        border-radius: 21px;
        background:
          radial-gradient(circle at 34% 28%, rgba(255, 255, 255, 0.32), transparent 16%),
          linear-gradient(145deg, #ffd14f, #ee593d 54%, #6b2819);
      }

      .food-card:nth-child(3) .food-thumb {
        background: linear-gradient(145deg, #ffe16a, #ef9648 48%, #7d2d17);
      }

      .food-card:nth-child(4) .food-thumb {
        background: linear-gradient(145deg, #f7d86a, #c7792e 48%, #5c2f17);
      }

      .food-title {
        font-size: 16px;
        font-weight: 1000;
        letter-spacing: -0.03em;
      }

      .food-desc {
        margin-top: 3px;
        color: rgba(255, 255, 255, 0.56);
        font-size: 12px;
        font-weight: 700;
        line-height: 1.25;
      }

      .price {
        color: #ffe179;
        font-size: 14px;
        font-weight: 1000;
      }

      .target-ring {
        position: absolute;
        left: 11px;
        right: 11px;
        top: 302px;
        height: 98px;
        border-radius: 31px;
        border: 2px solid rgba(255, 233, 121, 0.95);
        box-shadow:
          0 0 0 6px rgba(255, 215, 72, 0.16),
          0 18px 46px rgba(0, 0, 0, 0.24);
        pointer-events: none;
      }

      .smartbar {
        position: absolute;
        left: 50%;
        bottom: calc(76px + env(safe-area-inset-bottom));
        width: min(326px, calc(100% - 64px));
        height: 530px;
        transform: translateX(-50%);
        overflow: hidden;
        border-radius: 30px;
        border: 1px solid var(--glass-border);
        background:
          linear-gradient(180deg, var(--glass-fill-top) 0%, var(--glass-fill-mid) 42%, var(--glass-fill-bottom) 100%);
        -webkit-backdrop-filter: blur(22px) saturate(190%);
        backdrop-filter: blur(22px) saturate(190%);
        box-shadow:
          inset 0 1px 1px rgba(255, 255, 255, 0.58),
          inset 0 -1px 6px rgba(255, 255, 255, 0.08),
          0 22px 54px var(--glass-shadow),
          0 0 0 1px var(--glass-ring);
        color: var(--ink);
      }

      .smartbar::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 18% 0%, rgba(255, 255, 255, 0.24), transparent 30%),
          linear-gradient(90deg, rgba(255, 255, 255, 0.04), transparent 20% 74%, rgba(255, 255, 255, 0.035));
        pointer-events: none;
      }

      .smartbar-inner {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        height: 100%;
        padding: 16px;
      }

      .cart-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .cart-title {
        font-size: 22px;
        font-weight: 1000;
        letter-spacing: -0.055em;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.48);
      }

      .complete-pill {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        border-radius: 999px;
        padding: 7px 10px;
        background: rgba(125, 242, 165, 0.94);
        color: #07110b;
        font-size: 12px;
        font-weight: 1000;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.42), 0 9px 18px rgba(16, 185, 129, 0.16);
      }

      .ribbon-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-top: 12px;
      }

      .ribbon {
        display: flex;
        min-height: 50px;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        padding: 8px 7px;
        font-weight: 1000;
        text-align: center;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.38), 0 8px 18px rgba(0, 0, 0, 0.10);
      }

      .ribbon span:first-child {
        font-size: 10px;
        line-height: 1;
        letter-spacing: 0.13em;
        text-transform: uppercase;
      }

      .ribbon span:last-child {
        margin-top: 5px;
        font-size: 15px;
        line-height: 1;
      }

      .ribbon.complete {
        background: rgba(125, 242, 165, 0.92);
        color: #07110b;
      }

      .ribbon.pending {
        background: rgba(239, 63, 91, 0.90);
        color: white;
      }

      .ribbon.extras {
        background: rgba(246, 214, 83, 0.94);
        color: #1c1304;
      }

      .cart-list {
        flex: 1;
        margin-top: 12px;
        min-height: 0;
        overflow: hidden;
      }

      .cart-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
        min-height: 76px;
        margin-bottom: 9px;
        padding: 13px 13px;
        border-radius: 22px;
        border: 1px solid rgba(255, 255, 255, 0.46);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.30), 0 12px 30px rgba(0, 0, 0, 0.16);
      }

      .cart-row.ready {
        background: rgba(125, 242, 165, 0.84);
        color: #07110b;
      }

      .cart-row.pending {
        background: rgba(239, 63, 91, 0.86);
        color: white;
      }

      .cart-row.options {
        background: rgba(246, 214, 83, 0.90);
        color: #1c1304;
      }

      .row-title {
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
        font-size: 16px;
        font-weight: 1000;
        letter-spacing: -0.035em;
      }

      .row-helper {
        margin-top: 4px;
        opacity: 0.70;
        font-size: 13px;
        font-weight: 850;
      }

      .row-side {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 9px;
        font-weight: 1000;
      }

      .trash {
        display: grid;
        width: 27px;
        height: 27px;
        place-items: center;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.32);
        font-size: 14px;
      }

      .totals {
        margin-top: 4px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.26);
        background: rgba(3, 7, 18, 0.30);
        -webkit-backdrop-filter: blur(14px) saturate(180%);
        backdrop-filter: blur(14px) saturate(180%);
        padding: 12px 14px;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.15), 0 -8px 24px rgba(2, 6, 23, 0.12);
      }

      .total-line {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        color: rgba(255, 255, 255, 0.78);
        font-size: 12px;
        font-weight: 1000;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .total-line + .total-line {
        margin-top: 5px;
      }

      .grand-total {
        margin-top: 9px;
        padding-top: 9px;
        border-top: 1px solid rgba(255, 255, 255, 0.16);
        color: white;
        font-size: 18px;
        letter-spacing: -0.02em;
        text-transform: none;
      }

      .footer-chrome {
        position: absolute;
        left: 50%;
        bottom: calc(12px + env(safe-area-inset-bottom));
        width: min(326px, calc(100% - 64px));
        height: 46px;
        transform: translateX(-50%);
      }

      .chrome-pill {
        position: absolute;
        top: 0;
        display: flex;
        height: 46px;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.52);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.06));
        -webkit-backdrop-filter: blur(18px) saturate(190%);
        backdrop-filter: blur(18px) saturate(190%);
        box-shadow:
          inset 0 1px 1px rgba(255, 255, 255, 0.50),
          0 12px 28px rgba(2, 6, 23, 0.22),
          0 0 0 1px rgba(255, 255, 255, 0.22);
        color: white;
        font-weight: 950;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.50);
      }

      .chrome-small {
        width: 46px;
      }

      .chrome-left {
        left: 0;
      }

      .chrome-right {
        right: 0;
      }

      .chrome-main {
        left: 54px;
        width: calc(100% - 108px);
        padding: 0 14px;
      }

      .mock-note {
        position: absolute;
        left: 14px;
        top: calc(100% - 70px);
        z-index: 1;
        color: rgba(255, 255, 255, 0.26);
        font-size: 10px;
        font-weight: 900;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
    </style>
  </head>
