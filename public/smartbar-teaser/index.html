<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartBar Teaser | getN2AI</title>
    <style>
      :root {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #0f172a;
        background: #f5f9ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px 18px;
        background:
          radial-gradient(circle at top left, rgba(191, 219, 254, 0.7), transparent 38%),
          linear-gradient(180deg, #ffffff 0%, #eef6ff 100%);
      }

      main {
        width: 100%;
        max-width: 760px;
        text-align: center;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 8px 14px;
        border-radius: 999px;
        background: #dbeafe;
        color: #0b3f91;
        font-weight: 800;
        font-size: 14px;
        letter-spacing: 0.02em;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0;
        font-size: clamp(34px, 7vw, 64px);
        line-height: 0.95;
        color: #082f75;
        letter-spacing: -0.06em;
      }

      .subhead {
        margin: 18px auto 24px;
        max-width: 620px;
        font-size: clamp(18px, 3vw, 24px);
        line-height: 1.35;
        color: #334155;
      }

      .videoWrap {
        width: min(420px, 100%);
        margin: 0 auto;
        padding: 12px;
        border-radius: 34px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 24px 70px rgba(15, 23, 42, 0.18);
        border: 1px solid rgba(148, 163, 184, 0.28);
      }

      video {
        display: block;
        width: 100%;
        aspect-ratio: 1 / 1;
        border-radius: 24px;
        background: #e2e8f0;
      }

      .cta {
        margin: 28px auto 0;
        max-width: 620px;
        padding: 22px;
        border-radius: 28px;
        background: #ffffff;
        border: 1px solid rgba(148, 163, 184, 0.25);
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.09);
      }

      .cta p {
        margin: 0;
        font-size: 18px;
        line-height: 1.45;
        color: #334155;
      }

      .cta strong {
        color: #082f75;
      }

      .link {
        display: inline-flex;
        margin-top: 16px;
        padding: 13px 20px;
        border-radius: 999px;
        background: #082f75;
        color: white;
        text-decoration: none;
        font-weight: 800;
      }

      .footer {
        margin-top: 22px;
        font-size: 14px;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="badge">SmartBar for takeout orders</div>

      <h1>Phone-style orders.<br />Kitchen-ready tickets.</h1>

      <p class="subhead">
        Customers say what they want. SmartBar turns it into a clean order your team can handle.
      </p>

      <section class="videoWrap" aria-label="SmartBar end-to-end teaser video">
        <video controls playsinline preload="metadata">
          <source src="/videos/smartbar-end-to-end-teaser.mp4" type="video/mp4" />
          Your browser does not support the video tag.
        </video>
      </section>

      <section class="cta">
        <p>
          <strong>Want the full walkthrough?</strong><br />
          Use the demo link from the email we sent you.
        </p>
        <a class="link" href="https://smartbar.getn2ai.com">Open SmartBar demo</a>
      </section>

      <div class="footer">getN2AI · SmartBar</div>
    </main>
  </body>
</html>
